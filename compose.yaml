name: ${COMPOSE_PROJECT_NAME:-lice}

x-api-build: &api-build
  context: ./apps/api
  dockerfile: Dockerfile

x-service-security: &service-security
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    <<: *service-security
    image: postgres:17.10-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?execute make dev-env}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?execute make dev-env}
      LICE_MIGRATOR_PASSWORD: ${LICE_MIGRATOR_PASSWORD:?execute make dev-env}
      LICE_RUNTIME_PASSWORD: ${LICE_RUNTIME_PASSWORD:?execute make dev-env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username postgres --dbname postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

  migrations:
    <<: *service-security
    image: postgres:17.10-bookworm
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: lice
      PGUSER: lice_migrator
      PGPASSWORD: ${LICE_MIGRATOR_PASSWORD:?execute make dev-env}
    entrypoint: ["/usr/bin/env", "bash", "/opt/lice/bin/migrate.sh"]
    volumes:
      - ./infra/postgres/migrate.sh:/opt/lice/bin/migrate.sh:ro
      - ./apps/api/db/migrations:/opt/lice/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  keycloak:
    <<: *service-security
    image: quay.io/keycloak/keycloak:26.7.0
    command:
      - start-dev
      - --import-realm
      - --spi-theme--static-max-age=-1
      - --spi-theme--cache-themes=false
      - --spi-theme--cache-templates=false
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?execute make dev-env}
      KC_BOOTSTRAP_ADMIN_CLIENT_ID: ${KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_ID:?execute make dev-env}
      KC_BOOTSTRAP_ADMIN_CLIENT_SECRET: ${KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_SECRET:?execute make dev-env}
      KC_HOSTNAME: http://auth.lice.localhost:8080
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      LICE_OIDC_CLIENT_SECRET: ${LICE_OIDC_CLIENT_SECRET:?execute make dev-env}
    volumes:
      - ./infra/keycloak/realm:/opt/keycloak/data/import:ro
      - ./infra/keycloak/themes/lice:/opt/keycloak/themes/lice:ro
    expose:
      - "8080"
      - "9000"
    networks:
      default:
        aliases:
          - auth.lice.localhost
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          { printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0;
          grep -q 'HTTP/1.0 200'; } 0<>/dev/tcp/127.0.0.1/9000
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  seed-keycloak:
    <<: *service-security
    image: python:3.13.14-alpine
    user: "0:0"
    environment:
      HOME: /tmp
      KEYCLOAK_ADMIN_URL: http://auth.lice.localhost:8080
      KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_ID: ${KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_ID:?execute make dev-env}
      KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_SECRET: ${KEYCLOAK_BOOTSTRAP_ADMIN_CLIENT_SECRET:?execute make dev-env}
      LICE_DEMO_OPERATOR_USERNAME: ${LICE_DEMO_OPERATOR_USERNAME:-operator@lice.local}
      LICE_DEMO_OPERATOR_PASSWORD: ${LICE_DEMO_OPERATOR_PASSWORD:?execute make dev-env}
      LICE_DEMO_VIEWER_USERNAME: ${LICE_DEMO_VIEWER_USERNAME:-viewer@lice.local}
      LICE_DEMO_VIEWER_PASSWORD: ${LICE_DEMO_VIEWER_PASSWORD:?execute make dev-env}
    entrypoint: ["python", "/opt/lice/bin/seed_demo_users.py"]
    volumes:
      - ./scripts/keycloak/seed_demo_users.py:/opt/lice/bin/seed_demo_users.py:ro
      - bootstrap_subjects:/var/run/lice-bootstrap
    read_only: true
    tmpfs:
      - /tmp:mode=0700
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  bootstrap-lice:
    <<: *service-security
    image: ${COMPOSE_PROJECT_NAME:-lice}-api-bootstrap:${LICE_IMAGE_TAG:-dev}
    build:
      <<: *api-build
      target: build
    environment:
      LICE_ENVIRONMENT: local
      LICE_DATABASE_URL: postgres://lice_migrator:${LICE_MIGRATOR_PASSWORD:?execute make dev-env}@postgres:5432/lice?sslmode=disable
      LICE_OIDC_ISSUER: http://auth.lice.localhost:8080/realms/lice
    entrypoint: ["/usr/bin/env", "bash", "/opt/lice/bin/bootstrap-lice.sh"]
    volumes:
      - ./scripts/bootstrap/bootstrap-lice.sh:/opt/lice/bin/bootstrap-lice.sh:ro
      - bootstrap_subjects:/var/run/lice-bootstrap:ro
    read_only: true
    tmpfs:
      - /tmp:mode=0700
    depends_on:
      migrations:
        condition: service_completed_successfully
      seed-keycloak:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *service-security
    image: ${COMPOSE_PROJECT_NAME:-lice}-api:${LICE_IMAGE_TAG:-dev}
    build: *api-build
    environment:
      LICE_ENVIRONMENT: local
      LICE_HTTP_ADDR: :8080
      LICE_DATABASE_URL: postgres://lice_runtime:${LICE_RUNTIME_PASSWORD:?execute make dev-env}@postgres:5432/lice?sslmode=disable
      LICE_PUBLIC_URL: http://lice.localhost:8080
      LICE_OIDC_ISSUER: http://auth.lice.localhost:8080/realms/lice
      LICE_OIDC_CLIENT_ID: lice-web
      LICE_OIDC_CLIENT_SECRET: ${LICE_OIDC_CLIENT_SECRET:?execute make dev-env}
      LICE_SESSION_HASH_KEY: ${LICE_SESSION_HASH_KEY:?execute make dev-env}
      LICE_LOGIN_ENCRYPTION_KEY: ${LICE_LOGIN_ENCRYPTION_KEY:?execute make dev-env}
      LICE_CSRF_KEY: ${LICE_CSRF_KEY:?execute make dev-env}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/lice-api", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:mode=0700
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      bootstrap-lice:
        condition: service_completed_successfully
    restart: unless-stopped

  api-integration-tests:
    <<: *service-security
    image: golang:1.26.5-bookworm
    profiles:
      - test
    working_dir: /src
    environment:
      LICE_TEST_DATABASE_URL: postgres://lice_migrator:${LICE_MIGRATOR_PASSWORD:?execute make dev-env}@postgres:5432/lice?sslmode=disable
    command:
      - go
      - test
      - -race
      - -count=1
      - -run
      - Integration
      - ./internal/postgres
    volumes:
      - ./apps/api:/src:ro
      - api_test_modules:/go/pkg/mod
      - api_test_build:/root/.cache/go-build
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: "no"

  web:
    <<: *service-security
    image: ${COMPOSE_PROJECT_NAME:-lice}-web:${LICE_IMAGE_TAG:-dev}
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp:mode=0700
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    <<: *service-security
    image: caddy:2.11.4-alpine
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    read_only: true
    tmpfs:
      - /config:mode=0700
      - /data:mode=0700
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/_proxy/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      default:
        aliases:
          - lice.localhost
    restart: unless-stopped

volumes:
  postgres_data:
  bootstrap_subjects:
  api_test_modules:
  api_test_build:
