name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      DEV_ENV: ${{ runner.temp }}/lice/dev.env
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate isolated CI environment
        run: make dev-env DEV_ENV="$DEV_ENV"

      - name: Validate tooling and Compose
        run: make validate DEV_ENV="$DEV_ENV"

      - name: Test API and web
        run: make test DEV_ENV="$DEV_ENV"

      - name: Start full local topology
        run: make dev DEV_ENV="$DEV_ENV"

      - name: Run smoke checks
        run: make smoke

      - name: Prove database isolation and audit immutability
        run: make test-integration DEV_ENV="$DEV_ENV"

      - name: Show sanitized service status on failure
        if: failure()
        run: docker compose --env-file "$DEV_ENV" --file compose.yaml ps

      - name: Tear down ephemeral data
        if: always()
        run: |
          if test -f "$DEV_ENV"; then
            docker compose --env-file "$DEV_ENV" --file compose.yaml down --volumes --remove-orphans
          fi
