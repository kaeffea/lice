version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
